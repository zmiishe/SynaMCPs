version: "3.9"

services:
  server:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/configs/config.local.yaml
      - S3_ACCESS_KEY=minio
      - S3_SECRET_KEY=miniostorage
      - EMBEDDING_API_KEY=dummy
      - SUMMARIZATION_API_KEY=dummy
    depends_on:
      - redis
      - postgres
      - minio
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/app"]
      interval: 15s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: syna
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniostorage
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    profiles: ["auth"]

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
    profiles: ["qdrant"]

volumes:
  postgres-data:
  minio-data:
