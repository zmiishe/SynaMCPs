openapi: 3.0.3
info:
  title: Syna MCP Knowledge API
  version: 0.1.0
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /api/knowledge:
    get:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: list
    post:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "201":
          description: created
  /api/knowledge/search:
    post:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: search hits
  /api/knowledge/{docId}:
    parameters:
      - in: path
        name: docId
        required: true
        schema:
          type: string
    get:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: one document
    delete:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "204":
          description: deleted
